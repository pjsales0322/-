<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>展晟照明 新人輔導系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft JhengHei',sans-serif;background:#0a1628;color:#f0f4ff;min-height:100vh;overflow:hidden}

/* ===== WELCOME ===== */
#welcomeScreen{position:fixed;inset:0;background:linear-gradient(135deg,#0a1628 0%,#0f2a50 50%,#0a1628 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .6s}
#welcomeScreen.hide{opacity:0;pointer-events:none}
.welcome-glow{position:absolute;width:520px;height:520px;background:radial-gradient(circle,rgba(249,115,22,.12) 0%,transparent 70%);border-radius:50%;animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.1);opacity:1}}
@keyframes floatIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.welcome-logo{font-size:54px;margin-bottom:8px;position:relative;z-index:1;animation:floatIn .8s ease-out}
.welcome-company{font-size:26px;font-weight:700;color:#f97316;letter-spacing:2px;position:relative;z-index:1;animation:floatIn .9s ease-out}
.welcome-dept{font-size:14px;color:#fb923c;margin-top:4px;margin-bottom:28px;position:relative;z-index:1;animation:floatIn 1s ease-out}
.welcome-card{background:rgba(15,32,64,.9);border:1px solid #1a3a6e;border-radius:20px;padding:32px 36px;width:390px;position:relative;z-index:1;backdrop-filter:blur(12px);animation:floatIn 1.1s ease-out;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.welcome-title{font-size:16px;font-weight:700;color:#f0f4ff;margin-bottom:5px;text-align:center}
.welcome-sub{font-size:13px;color:#64748b;text-align:center;margin-bottom:22px;line-height:1.6}
.w-field{margin-bottom:14px}
.w-field label{font-size:12px;color:#fb923c;font-weight:600;display:block;margin-bottom:5px;letter-spacing:.3px}
.w-field input{width:100%;background:#0a1628;border:1px solid #1a3a6e;color:#f0f4ff;padding:10px 14px;border-radius:10px;font-size:14px;transition:border-color .2s;font-family:inherit}
.w-field input:focus{outline:none;border-color:#f97316}
.day-selector{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:5px}
.day-btn{background:#0a1628;border:1px solid #1a3a6e;color:#64748b;padding:7px 3px;border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:all .2s;font-family:inherit}
.day-btn:hover{border-color:#f97316;color:#fb923c}
.day-btn.sel{background:rgba(249,115,22,.15);border-color:#f97316;color:#f97316;font-weight:700}
.day-btn.done-d{border-color:#22c55e;color:#86efac;background:rgba(34,197,94,.1)}
.w-enter-btn{width:100%;background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;border:none;padding:13px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;letter-spacing:.5px;transition:all .2s;font-family:inherit;box-shadow:0 4px 16px rgba(249,115,22,.3)}
.w-enter-btn:hover{background:linear-gradient(135deg,#fb923c,#f97316);box-shadow:0 6px 22px rgba(249,115,22,.45)}
.w-enter-btn:disabled{background:#1a3a6e;color:#475569;cursor:not-allowed;box-shadow:none}
.w-greeting{background:linear-gradient(135deg,rgba(249,115,22,.12),rgba(234,88,12,.08));border:1px solid rgba(249,115,22,.3);border-radius:12px;padding:14px;margin-bottom:18px;font-size:13px;line-height:1.7;color:#fed7aa;display:none}
.w-greeting.show{display:block;animation:floatIn .5s ease-out}
.w-greeting b{color:#f97316}

/* ===== APP ===== */
#appScreen{display:none;flex-direction:column;height:100vh}
#appScreen.show{display:flex}
header{background:linear-gradient(135deg,#0f2040,#0a1f3d);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #f97316;flex-shrink:0}
.logo{font-size:19px;font-weight:700;color:#f97316}
.sub{font-size:12px;color:#fb923c}
.header-right{display:flex;align-items:center;gap:10px}
.user-pill{background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.4);border-radius:99px;padding:5px 12px;font-size:12px;color:#fb923c;display:flex;align-items:center;gap:6px}
.user-pill b{color:#f97316}
.day-pill{background:rgba(249,115,22,.15);border:1px solid #f97316;border-radius:99px;padding:5px 12px;font-size:12px;color:#f97316;font-weight:700}
.logout-btn{background:none;border:1px solid #1a3a6e;color:#94a3b8;padding:5px 10px;border-radius:8px;cursor:pointer;font-size:11px;transition:all .2s;font-family:inherit}
.logout-btn:hover{border-color:#ef4444;color:#ef4444}

.main{display:flex;flex:1;overflow:hidden}

/* sidebar */
.sidebar{width:250px;min-width:210px;background:#0f2040;border-right:1px solid #1a3a6e;display:flex;flex-direction:column;overflow:hidden}
.sidebar-top{padding:12px;border-bottom:1px solid #1a3a6e}
.day-label{font-size:10px;color:#64748b;margin-bottom:5px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.progress-bar-wrap{background:#0a1628;border-radius:99px;height:7px;margin-bottom:3px;overflow:hidden}
.progress-bar{background:linear-gradient(90deg,#f97316,#fb923c);height:100%;border-radius:99px;transition:width .5s}
.progress-text{font-size:11px;color:#fb923c;text-align:right}
.days-scroll{flex:1;overflow-y:auto;padding:7px}
.day-card{background:#0a1628;border:1px solid #1a3a6e;border-radius:9px;margin-bottom:5px;cursor:pointer;transition:all .2s;overflow:hidden}
.day-card:hover{border-color:#f97316;background:rgba(249,115,22,.07)}
.day-card.active{border-color:#f97316;background:rgba(249,115,22,.1)}
.day-card.done{border-left:3px solid #22c55e}
.day-card.today-card{border-color:#f97316;box-shadow:0 0 0 1px rgba(249,115,22,.25)}
.day-header{display:flex;align-items:center;padding:8px 11px;gap:7px}
.day-num{font-size:11px;font-weight:700;color:#f97316;min-width:36px}
.day-title{font-size:11px;color:#cbd5e1;flex:1;line-height:1.3}
.today-badge{font-size:9px;background:#f97316;color:#fff;border-radius:4px;padding:1px 5px;font-weight:700;flex-shrink:0}
.day-check{width:17px;height:17px;border-radius:50%;border:2px solid #1a3a6e;display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer;flex-shrink:0;transition:all .2s}
.day-check.checked{background:#22c55e;border-color:#22c55e}
/* task mini-bar in sidebar */
.day-task-bar{height:3px;background:#0a1628;margin:0 11px 8px;border-radius:99px;overflow:hidden}
.day-task-fill{height:100%;background:linear-gradient(90deg,#f97316,#fb923c);border-radius:99px;transition:width .4s}

/* content */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;padding:0 14px;background:#0f2040;border-bottom:1px solid #1a3a6e;gap:3px;padding-top:7px;flex-shrink:0}
.tab{padding:7px 16px;font-size:12px;border-radius:8px 8px 0 0;cursor:pointer;color:#94a3b8;transition:all .2s;border:1px solid transparent;border-bottom:none}
.tab.active{background:#0a1628;color:#f97316;border-color:#1a3a6e}
.tab:hover:not(.active){color:#fb923c}
.daily-brief{background:linear-gradient(135deg,rgba(249,115,22,.15),rgba(15,32,64,.8));border-bottom:1px solid rgba(249,115,22,.25);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.brief-icon{font-size:20px;flex-shrink:0}
.brief-title{font-size:12px;font-weight:700;color:#f97316;margin-bottom:1px}
.brief-desc{font-size:12px;color:#fed7aa;line-height:1.4}
.panel{display:none;flex:1;overflow-y:auto;padding:14px}
.panel.active{display:block}

/* mission card */
.mission-card{background:linear-gradient(135deg,rgba(249,115,22,.1),rgba(15,32,64,.8));border:1px solid rgba(249,115,22,.3);border-radius:12px;padding:14px;margin-bottom:12px}
.mission-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mission-title{font-size:13px;font-weight:700;color:#f97316;display:flex;align-items:center;gap:6px}
.mission-prog-wrap{background:#0a1628;border-radius:99px;height:8px;width:120px;overflow:hidden}
.mission-prog-fill{height:100%;background:linear-gradient(90deg,#f97316,#fb923c);border-radius:99px;transition:width .4s}
.mission-prog-text{font-size:11px;color:#fb923c;margin-top:3px;text-align:right}

.mission-item{display:flex;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid rgba(249,115,22,.1)}
.mission-item:last-child{border-bottom:none}
.mission-item.done-task .m-text{color:#64748b;text-decoration:line-through}
.m-check-btn{width:22px;height:22px;border-radius:6px;border:2px solid #1a3a6e;background:#0a1628;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all .2s;color:transparent;font-family:inherit}
.m-check-btn:hover{border-color:#f97316}
.m-check-btn.done{background:#f97316;border-color:#f97316;color:#fff}
.m-text{font-size:12px;color:#cbd5e1;flex:1;line-height:1.4}

/* time blocks */
.time-block{background:#0f2040;border:1px solid #1a3a6e;border-radius:9px;margin-bottom:9px;overflow:hidden}
.time-block-header{background:rgba(249,115,22,.15);padding:7px 13px;font-size:11px;font-weight:600;color:#fb923c;display:flex;align-items:center;flex-wrap:wrap;gap:6px;border-bottom:1px solid rgba(249,115,22,.2)}
.time-block-body{padding:9px 13px}
.item-row{display:flex;gap:7px;align-items:flex-start;padding:3px 0;font-size:12px;color:#cbd5e1;border-bottom:1px solid #0f2040}
.item-row:last-child{border-bottom:none}
.item-dot{width:5px;height:5px;background:#f97316;border-radius:50%;margin-top:5px;flex-shrink:0}
.test-box{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);border-radius:7px;padding:7px 11px;margin-top:5px;font-size:11px;color:#86efac}
.teacher-tag{background:rgba(249,115,22,.15);border:1px solid rgba(249,115,22,.35);border-radius:99px;padding:1px 8px;font-size:10px;color:#fb923c}

/* diary section */
.diary-card{background:#0f2040;border:1px solid #1a3a6e;border-radius:12px;padding:16px;margin-top:12px}
.diary-title{font-size:13px;font-weight:700;color:#f97316;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.diary-submitted{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);border-radius:8px;padding:10px 13px;font-size:13px;color:#86efac;line-height:1.6;white-space:pre-wrap}
.diary-submitted-label{font-size:11px;color:#22c55e;font-weight:600;margin-bottom:6px}
textarea.diary-input{width:100%;background:#0a1628;border:1px solid #1a3a6e;color:#f0f4ff;padding:10px 13px;border-radius:9px;font-size:13px;resize:none;font-family:inherit;line-height:1.6;transition:border-color .2s}
textarea.diary-input:focus{outline:none;border-color:#f97316}
.diary-actions{display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:10px}
.diary-hint{font-size:11px;color:#475569;flex:1}
.diary-submit-btn{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;border:none;padding:9px 22px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;box-shadow:0 2px 10px rgba(249,115,22,.3);transition:all .2s;white-space:nowrap}
.diary-submit-btn:hover{background:linear-gradient(135deg,#fb923c,#f97316);box-shadow:0 4px 16px rgba(249,115,22,.45)}
.diary-submit-btn:disabled{background:#1a3a6e;color:#475569;cursor:not-allowed;box-shadow:none}
.next-day-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,#0f2040,#0a2d1a);border:2px solid #22c55e;border-radius:16px;padding:28px 36px;text-align:center;z-index:999;box-shadow:0 20px 60px rgba(0,0,0,.6);animation:floatIn .4s ease-out}
.next-day-toast h3{color:#22c55e;font-size:18px;margin-bottom:8px}
.next-day-toast p{color:#86efac;font-size:13px;margin-bottom:16px}
.next-day-toast button{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;border:none;padding:10px 24px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit}

/* quiz */
.quiz-area{display:flex;flex-direction:column;gap:11px}
.quiz-q{background:#0f2040;border:1px solid #1a3a6e;border-radius:9px;padding:13px}
.quiz-q .q-text{font-size:13px;margin-bottom:9px;color:#f0f4ff}
.quiz-opts label{display:block;padding:7px 10px;margin:3px 0;background:#0a1628;border:1px solid #1a3a6e;border-radius:7px;cursor:pointer;font-size:12px;color:#cbd5e1;transition:all .2s}
.quiz-opts label:hover{border-color:#f97316;color:#f0f4ff}
.quiz-opts input[type=radio]{display:none}
.quiz-opts input[type=radio]:checked+label{border-color:#f97316;background:rgba(249,115,22,.12);color:#f97316}
.quiz-opts input[type=radio]:disabled+label{cursor:default;opacity:.85}
.quiz-btn{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;border:none;padding:8px 18px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;margin-top:6px;font-family:inherit}
.quiz-btn:hover{background:linear-gradient(135deg,#fb923c,#f97316)}
.quiz-btn:disabled{background:#1a3a6e;color:#475569;cursor:not-allowed}
.quiz-result{margin-top:7px;padding:9px;border-radius:7px;font-size:12px}
.quiz-result.correct{background:rgba(34,197,94,.08);color:#86efac;border:1px solid rgba(34,197,94,.3)}
.quiz-result.wrong{background:rgba(239,68,68,.08);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
.score-bar{background:#0f2040;border:1px solid #1a3a6e;border-radius:9px;padding:12px;margin-bottom:11px;display:flex;align-items:center;gap:12px}
.score-circle{width:50px;height:50px;border-radius:50%;border:3px solid #f97316;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#f97316;flex-shrink:0}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#0a1628}
::-webkit-scrollbar-thumb{background:#1a3a6e;border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:#f97316}
</style>
</head>
<body>

<!-- WELCOME -->
<div id="welcomeScreen">
  <div class="welcome-glow"></div>
  <div class="welcome-logo">💡</div>
  <div class="welcome-company">展晟照明集團</div>
  <div class="welcome-dept">專案業務 MA 班 ─ 新進人員輔導系統</div>
  <div class="welcome-card">
    <div id="wGreeting" class="w-greeting"></div>
    <div class="welcome-title">歡迎登入</div>
    <div class="welcome-sub">請輸入您的資訊以開始今日訓練</div>
    <div class="w-field">
      <label>帳號（員工編號或英文名）</label>
      <input id="wAccount" type="text" placeholder="例：A001 或 john" autocomplete="off">
    </div>
    <div class="w-field">
      <label>姓名</label>
      <input id="wName" type="text" placeholder="請輸入中文姓名">
    </div>
    <div class="w-field">
      <label>今天是第幾天訓練？</label>
      <div class="day-selector" id="daySel"></div>
    </div>
    <button class="w-enter-btn" id="enterBtn" onclick="enterApp()" disabled>進入訓練系統 →</button>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <header>
    <div>
      <div class="logo">💡 展晟照明集團</div>
      <div class="sub">專案業務 MA 班 ─ 新進人員輔導系統</div>
    </div>
    <div class="header-right">
      <div class="user-pill">👤 <b id="hName"></b><span style="color:#1a3a6e;margin:0 4px">|</span><span id="hAccount" style="color:#64748b"></span></div>
      <div class="day-pill" id="hDay">Day 1</div>
      <button class="logout-btn" onclick="logout()">登出</button>
    </div>
  </header>
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-top">
        <div class="day-label">整體訓練進度</div>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progBar" style="width:0%"></div></div>
        <div class="progress-text" id="progText">0 / 14 天完成</div>
      </div>
      <div class="days-scroll" id="dayList"></div>
    </div>
    <div class="content">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('schedule')">📋 課程內容</div>
        <div class="tab" onclick="switchTab('quiz')">✏️ 測驗練習</div>
      </div>
      <div class="daily-brief">
        <div class="brief-icon">🌅</div>
        <div class="brief-text">
          <div class="brief-title" id="briefTitle"></div>
          <div class="brief-desc" id="briefDesc"></div>
        </div>
      </div>
      <div class="panel active" id="schedulePanel"></div>
      <div class="panel" id="quizPanel"></div>
    </div>
  </div>
</div>

<script>
const SHEET_URL='https://script.google.com/macros/s/AKfycby5nzoik1A0IknonYG2Gfq6YbQzh2iqFe4l_mf0CNYq5knEctb600FD8RRyxIWGGuhIlQ/exec';

  {day:2,q:"「照度」的單位是？",opts:["流明(lm)","克耳文(K)","勒克斯(lux/lx)","瓦特(W)"],ans:2,exp:"照度單位是「勒克斯（lux/lx）」，代表單位面積接收到的光通量，各空間有CNS最低照度規範。"}
];

// ==================== localStorage ====================
const LS_SESSION='dl_session';
const lsKey=acc=>`dl_user_${acc}`;
const lsSave=(acc,d)=>{try{localStorage.setItem(lsKey(acc),JSON.stringify(d))}catch(e){}};
const lsLoad=acc=>{try{const v=localStorage.getItem(lsKey(acc));return v?JSON.parse(v):null}catch(e){return null}};
const lsSaveSession=acc=>{try{localStorage.setItem(LS_SESSION,acc)}catch(e){}};
const lsLoadSession=()=>{try{return localStorage.getItem(LS_SESSION)||''}catch(e){return ''}};
const lsClearSession=()=>{try{localStorage.removeItem(LS_SESSION)}catch(e){}};

// ==================== STATE ====================
let userData={account:'',name:'',currentDay:1,completed:new Set()};
let quizScores={};
let taskProgress={};   // key: "day_idx" → true/false
let diaryEntries={};   // key: day(number) → string
let selectedDay=null;

function persistUser(){
  lsSave(userData.account,{
    account:userData.account, name:userData.name,
    currentDay:userData.currentDay,
    completed:[...userData.completed],
    quizScores, taskProgress, diaryEntries
  });
  syncToSheets();
}

// ==================== GOOGLE SHEETS 同步 ====================
let syncTimer=null;
function syncToSheets(){
  clearTimeout(syncTimer);
  syncTimer=setTimeout(doSync, 1000);
}

function doSync(){
  const payload={
    account:userData.account,
    name:userData.name,
    currentDay:userData.currentDay,
    completed:[...userData.completed],
    quizScores:quizScores,
    taskProgress:taskProgress,
    diaryEntries:diaryEntries
  };
  const encoded=encodeURIComponent(JSON.stringify(payload));
  const url=`${SHEET_URL}?payload=${encoded}`;
  showSyncBadge('🔄 同步中…');

  // 用隱藏 form 提交（最可靠，完全無 CORS 問題）
  const form=document.createElement('form');
  form.method='GET';
  form.action=SHEET_URL;
  form.target='syncTarget';
  form.style.display='none';
  const input=document.createElement('input');
  input.type='hidden';
  input.name='payload';
  input.value=JSON.stringify(payload);
  form.appendChild(input);

  // 建立隱藏 iframe 作為 form target
  let iframe=document.getElementById('syncTarget');
  if(!iframe){
    iframe=document.createElement('iframe');
    iframe.name='syncTarget';
    iframe.id='syncTarget';
    iframe.style.display='none';
    document.body.appendChild(iframe);
  }
  iframe.onload=()=>showSyncBadge('✅ 已同步至雲端');

  document.body.appendChild(form);
  form.submit();
  setTimeout(()=>form.remove(), 3000);

  // 雙保險：同時送 Image beacon
  const img=new Image();
  img.src=url+'&t='+Date.now();
}

function showSyncBadge(msg){
  let b=document.getElementById('syncBadge');
  if(!b){
    b=document.createElement('div');
    b.id='syncBadge';
    b.style.cssText='position:fixed;bottom:18px;right:18px;background:#0f2040;border:1px solid #f97316;color:#fb923c;padding:9px 16px;border-radius:10px;font-size:12px;font-weight:600;z-index:999;transition:opacity .5s;box-shadow:0 4px 16px rgba(249,115,22,.25)';
    document.body.appendChild(b);
  }
  b.textContent=msg; b.style.opacity='1';
  clearTimeout(b._t);
  b._t=setTimeout(()=>b.style.opacity='0',3000);
}

// ==================== WELCOME ====================
(function initWelcome(){
  const sel=document.getElementById('daySel');
  for(let i=1;i<=14;i++){
    const b=document.createElement('button');
    b.className='day-btn';b.textContent=i;b.dataset.day=i;
    b.onclick=()=>{document.querySelectorAll('.day-btn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');onWFieldChange();};
    sel.appendChild(b);
  }
  document.getElementById('wAccount').addEventListener('input',onWFieldChange);
  document.getElementById('wName').addEventListener('input',onWFieldChange);
  const last=lsLoadSession();
  if(last){const s=lsLoad(last);if(s)autoFill(s);}
  document.getElementById('wAccount').addEventListener('blur',function(){
    const s=lsLoad(this.value.trim());if(s)autoFill(s);
  });
})();

function autoFill(saved){
  document.getElementById('wAccount').value=saved.account||'';
  document.getElementById('wName').value=saved.name||'';
  document.querySelectorAll('.day-btn').forEach(b=>{
    if((saved.completed||[]).includes(parseInt(b.dataset.day)))b.classList.add('done-d');
  });
  const day=Math.min(saved.currentDay||1,14);
  const btn=document.querySelector(`.day-btn[data-day="${day}"]`);
  if(btn){document.querySelectorAll('.day-btn').forEach(x=>x.classList.remove('sel'));btn.classList.add('sel');}
  showGreeting(saved.name,day,true);
  onWFieldChange();
}

function onWFieldChange(){
  const acc=document.getElementById('wAccount').value.trim();
  const nm=document.getElementById('wName').value.trim();
  document.getElementById('enterBtn').disabled=!(acc&&nm);
}

function showGreeting(name,day,isReturn){
  const g=document.getElementById('wGreeting');
  g.innerHTML=isReturn
    ?`👋 歡迎回來，<b>${name}</b>！偵測到您上次進行到 <b>第 ${day} 天</b>，已為您自動帶入。`
    :`🎉 歡迎加入展晟照明，<b>${name}</b>！<br>很高興有你加入專案業務部這個大家庭，未來有任何問題都歡迎提出，一起討論成長！`;
  g.classList.add('show');
}

function enterApp(){
  const acc=document.getElementById('wAccount').value.trim();
  const nm=document.getElementById('wName').value.trim();
  const selBtn=document.querySelector('.day-btn.sel');
  const selDay=selBtn?parseInt(selBtn.dataset.day):1;
  if(!acc||!nm)return;
  const saved=lsLoad(acc);
  userData.account=acc;userData.name=nm;userData.currentDay=selDay;
  userData.completed=new Set(saved?.completed||[]);
  quizScores=saved?.quizScores||{};
  taskProgress=saved?.taskProgress||{};
  diaryEntries=saved?.diaryEntries||{};
  if(!saved)showGreeting(nm,selDay,false);
  lsSaveSession(acc);
  persistUser();
  startApp();
}

// ==================== APP ====================
function startApp(){
  document.getElementById('welcomeScreen').classList.add('hide');
  setTimeout(()=>document.getElementById('welcomeScreen').style.display='none',600);
  const app=document.getElementById('appScreen');
  app.style.display='flex';app.classList.add('show');
  document.getElementById('hName').textContent=userData.name;
  document.getElementById('hAccount').textContent=userData.account;
  document.getElementById('hDay').textContent=`Day ${userData.currentDay}`;
  buildDayList();
  selectDayPanel(userData.currentDay);
  renderQuiz();
}

function buildDayList(){
  const list=document.getElementById('dayList');list.innerHTML='';
  TRAINING_DATA.forEach(d=>{
    const isToday=d.day===userData.currentDay;
    const isDone=userData.completed.has(d.day);
    const {done,total}=getTaskStats(d.day);
    const pct=total>0?Math.round(done/total*100):0;
    const el=document.createElement('div');
    el.className=`day-card${isToday?' today-card':''}${isDone?' done':''}`;
    el.id=`dc-${d.day}`;
    el.innerHTML=`<div class="day-header">
      <span class="day-num">Day ${d.day}</span>
      <span class="day-title">${d.title}</span>
      ${isToday?'<span class="today-badge">TODAY</span>':''}
      <div class="day-check${isDone?' checked':''}" onclick="toggleDone(event,${d.day})">${isDone?'✓':''}</div>
    </div>
    <div class="day-task-bar"><div class="day-task-fill" style="width:${pct}%"></div></div>`;
    el.addEventListener('click',()=>selectDayPanel(d.day));
    list.appendChild(el);
  });
  updateProgress();
}

function getTaskStats(day){
  const d=TRAINING_DATA.find(x=>x.day===day);
  if(!d)return{done:0,total:0};
  const total=d.missions.length;
  let done=0;
  for(let i=0;i<total;i++){if(taskProgress[`${day}_${i}`])done++;}
  return{done,total};
}

function toggleDone(e,day){
  e.stopPropagation();
  if(userData.completed.has(day))userData.completed.delete(day);
  else userData.completed.add(day);
  const card=document.getElementById(`dc-${day}`);
  card.classList.toggle('done',userData.completed.has(day));
  const chk=card.querySelector('.day-check');
  chk.classList.toggle('checked',userData.completed.has(day));
  chk.textContent=userData.completed.has(day)?'✓':'';
  updateProgress();
  persistUser();
}

function updateProgress(){
  const pct=Math.round(userData.completed.size/14*100);
  document.getElementById('progBar').style.width=pct+'%';
  document.getElementById('progText').textContent=`${userData.completed.size} / 14 天完成`;
}

function selectDayPanel(day){
  selectedDay=day;
  document.querySelectorAll('.day-card').forEach(c=>c.classList.remove('active'));
  document.getElementById(`dc-${day}`)?.classList.add('active');
  renderSchedule(day);renderBrief(day);
}

function renderBrief(day){
  const d=TRAINING_DATA.find(x=>x.day===day);if(!d)return;
  document.getElementById('briefTitle').textContent=day===userData.currentDay?`📅 今日訓練 ─ 第${day}天：${d.title}`:`📅 第${day}天：${d.title}`;
  document.getElementById('briefDesc').textContent=d.brief;
}

function renderSchedule(day){
  const d=TRAINING_DATA.find(x=>x.day===day);if(!d)return;
  const {done,total}=getTaskStats(day);
  const pct=total>0?Math.round(done/total*100):0;

  // Mission card with task checkboxes
  let mHtml=`<div class="mission-card">
    <div class="mission-header">
      <div class="mission-title">✅ 今日任務清單</div>
      <div>
        <div class="mission-prog-wrap"><div class="mission-prog-fill" id="mpf-${day}" style="width:${pct}%"></div></div>
        <div class="mission-prog-text" id="mpt-${day}">${done}/${total} 完成</div>
      </div>
    </div>
    ${d.missions.map((m,i)=>{
      const key=`${day}_${i}`;
      const isDone=!!taskProgress[key];
      return `<div class="mission-item${isDone?' done-task':''}" id="mi-${day}-${i}">
        <button class="m-check-btn${isDone?' done':''}" onclick="toggleTask(${day},${i})" title="標記完成">${isDone?'✓':''}</button>
        <span class="m-text">${m}</span>
      </div>`;
    }).join('')}
  </div>`;

  // Schedule blocks
  let sHtml='';
  [{label:'🌅 上午',items:d.am},{label:'🌇 下午',items:d.pm}].forEach(s=>{
    (s.items||[]).forEach(blk=>{
      sHtml+=`<div class="time-block">
        <div class="time-block-header">${s.label} ${blk.time||''}${blk.teacher?` <span class="teacher-tag">👨‍🏫 ${blk.teacher}</span>`:''}
        </div>
        <div class="time-block-body">
          ${blk.items.map(i=>`<div class="item-row"><div class="item-dot"></div><span>${i}</span></div>`).join('')}
          ${blk.test?`<div class="test-box">📝 ${blk.test}</div>`:''}
        </div>
      </div>`;
    });
  });

  // Diary section
  const existing=diaryEntries[day]||'';
  const diaryHtml=`<div class="diary-card">
    <div class="diary-title">📝 今日學習日報心得</div>
    ${existing
      ?`<div class="diary-submitted-label">✅ 已提交</div>
        <div class="diary-submitted">${existing}</div>
        <div style="margin-top:10px">
          <button onclick="editDiary(${day})" style="background:none;border:1px solid #1a3a6e;color:#94a3b8;padding:5px 12px;border-radius:7px;cursor:pointer;font-size:11px;font-family:inherit">✏️ 重新編輯</button>
        </div>`
      :`<textarea class="diary-input" id="diary-${day}" rows="5" placeholder="請寫下今天的學習心得、觀察與感想…"></textarea>
        <div class="diary-actions">
          <span class="diary-hint">💡 填寫完畢後點送出，系統將自動同步至雲端並跳至下一天</span>
          <button class="diary-submit-btn" onclick="submitDiary(${day})">送出 →</button>
        </div>`
    }
  </div>`;

  document.getElementById('schedulePanel').innerHTML=mHtml+sHtml+diaryHtml;
}

function toggleTask(day,idx){
  const key=`${day}_${idx}`;
  taskProgress[key]=!taskProgress[key];
  // update UI
  const mi=document.getElementById(`mi-${day}-${idx}`);
  const btn=mi.querySelector('.m-check-btn');
  const isDone=taskProgress[key];
  mi.classList.toggle('done-task',isDone);
  btn.classList.toggle('done',isDone);
  btn.textContent=isDone?'✓':'';
  // update progress bar
  const {done,total}=getTaskStats(day);
  const pct=total>0?Math.round(done/total*100):0;
  const mpf=document.getElementById(`mpf-${day}`);
  const mpt=document.getElementById(`mpt-${day}`);
  if(mpf)mpf.style.width=pct+'%';
  if(mpt)mpt.textContent=`${done}/${total} 完成`;
  // update sidebar mini bar
  const fill=document.querySelector(`#dc-${day} .day-task-fill`);
  if(fill)fill.style.width=pct+'%';
  persistUser();
}

function submitDiary(day){
  const ta=document.getElementById(`diary-${day}`);
  const text=ta?ta.value.trim():'';
  if(!text){alert('請填寫今日心得後再送出！');return;}
  diaryEntries[day]=text;
  persistUser();
  // re-render diary section as submitted
  renderSchedule(day);
  // show toast and jump to next day
  showNextDayToast(day);
}

function editDiary(day){
  const old=diaryEntries[day]||'';
  delete diaryEntries[day];
  renderSchedule(day);
  const ta=document.getElementById(`diary-${day}`);
  if(ta)ta.value=old;
}

function showNextDayToast(day){
  const next=day+1;
  const toast=document.createElement('div');
  toast.className='next-day-toast';
  toast.innerHTML=`<h3>🎉 Day ${day} 完成！</h3>
    <p>日報心得已上傳至雲端<br>${next<=14?`即將跳至第 ${next} 天訓練`:'恭喜完成全部14天訓練！'}</p>
    <button onclick="this.parentElement.remove();${next<=14?`goNextDay(${next})`:''}">${next<=14?`前往 Day ${next} →`:'完成 🎊'}</button>`;
  document.body.appendChild(toast);
  if(next<=14)setTimeout(()=>{toast.remove();goNextDay(next);},3000);
}

function goNextDay(day){
  if(day>14)return;
  userData.currentDay=day;
  document.getElementById('hDay').textContent=`Day ${day}`;
  // mark previous day done
  userData.completed.add(day-1);
  persistUser();
  buildDayList();
  selectDayPanel(day);
}

function switchTab(tab){
  ['schedule','quiz'].forEach((t,i)=>{document.querySelectorAll('.tab')[i].classList.toggle('active',t===tab);});
  document.getElementById('schedulePanel').classList.toggle('active',tab==='schedule');
  document.getElementById('quizPanel').classList.toggle('active',tab==='quiz');
}

// ==================== QUIZ ====================
function renderQuiz(){
  const correct=Object.values(quizScores).filter(Boolean).length;
  const total=Object.keys(quizScores).length;
  let html='';
  if(total>0){
    const pct=Math.round(correct/total*100);
    html+=`<div class="score-bar"><div class="score-circle">${pct}%</div><div style="font-size:13px;color:#94a3b8"><b style="color:#f0f4ff">目前答題成績</b><br>共答 ${total} 題，答對 ${correct} 題</div></div>`;
  }
  html+=`<div class="quiz-area">`;
  QUIZZES.forEach((q,i)=>{
    const answered=quizScores.hasOwnProperty(String(i))||quizScores.hasOwnProperty(i);
    const isCorrect=quizScores[String(i)]||quizScores[i];
    html+=`<div class="quiz-q">
      <div class="q-text"><b style="color:#f97316">[Day ${q.day}]</b> ${q.q}</div>
      <div class="quiz-opts">${q.opts.map((o,j)=>`<div><input type="radio" name="q${i}" id="q${i}o${j}" value="${j}"${answered?` disabled${j===q.ans?' checked':''}` : ''}><label for="q${i}o${j}">${o}</label></div>`).join('')}</div>
      <div><button class="quiz-btn" onclick="checkQuiz(${i})"${answered?' disabled':''}>確認答案</button></div>
      ${answered?`<div class="quiz-result ${isCorrect?'correct':'wrong'}">${isCorrect?'✅ 答對了！':'❌ 正確答案：'+q.opts[q.ans]}<br><small>📖 ${q.exp}</small></div>`:''}
    </div>`;
  });
  html+=`</div>`;
  document.getElementById('quizPanel').innerHTML=html;
}

function checkQuiz(i){
  const q=QUIZZES[i];
  const sel=document.querySelector(`input[name="q${i}"]:checked`);
  if(!sel){alert('請先選擇答案');return;}
  quizScores[i]=parseInt(sel.value)===q.ans;
  persistUser();renderQuiz();
}

function logout(){
  persistUser();lsClearSession();
  userData={account:'',name:'',currentDay:1,completed:new Set()};
  quizScores={};taskProgress={};diaryEntries={};selectedDay=null;
  document.getElementById('appScreen').classList.remove('show');
  document.getElementById('appScreen').style.display='none';
  const ws=document.getElementById('welcomeScreen');
  ws.style.display='flex';ws.classList.remove('hide');
  document.getElementById('wAccount').value='';
  document.getElementById('wName').value='';
  document.getElementById('wGreeting').classList.remove('show');
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('sel','done-d'));
  document.getElementById('enterBtn').disabled=true;
}
</script>
</body>
</html>
